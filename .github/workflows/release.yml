name: Release

env:
    DOTNET_CONFIGURATION: 'Release'

on:
    push:
        tags:
            - "cli-v[0-9]+.[0-9]+.[0-9]+"
            - "sdk-v[0-9]+.[0-9]+.[0-9]+"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-and-pack:
        runs-on: ubuntu-latest
        outputs:
            project: ${{ steps.detect.outputs.project }}
            version: ${{ steps.detect.outputs.version }}
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
                with:
                    fetch-depth: 0

            -   name: Setup .NET
                uses: actions/setup-dotnet@v4

            -   name: Detect project and version
                id: detect
                run: |
                    TAG="${GITHUB_REF_NAME}"

                    PROJECT="${TAG%%-v*}"
                    VERSION="${TAG#*-v}"

                    echo "project=$PROJECT" >> $GITHUB_OUTPUT
                    echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Build
              run: dotnet build --configuration "$CONFIGURATION"
              env:
                  CONFIGURATION: ${{ env.DOTNET_CONFIGURATION }}

            - name: Test
              run: dotnet test --no-build --configuration "$CONFIGURATION"
              env:
                  CONFIGURATION: ${{ env.DOTNET_CONFIGURATION }}

            -   name: Pack CLI
                if: steps.detect.outputs.project == 'cli'
                run: |
                    dotnet pack "ThunderPipe/" \
                      --no-build \
                      --configuration "$CONFIGURATION" \
                      -p:Version="$VERSION" \
                      --output "nupkg/"
                env:
                    CONFIGURATION: ${{ env.DOTNET_CONFIGURATION }}
                    VERSION: ${{ steps.detect.outputs.version }}

            -   name: Pack SDK
                if: steps.detect.outputs.project == 'sdk'
                run: |
                    dotnet pack "ThunderPipe.Sdk/" \
                      --no-build \
                      --configuration "$CONFIGURATION" \
                      -p:Version="$VERSION" \
                      --output "nupkg/"
                env:
                    CONFIGURATION: ${{ env.DOTNET_CONFIGURATION }}
                    VERSION: ${{ steps.detect.outputs.version }}

            -   name: Upload package
                uses: actions/upload-artifact@v4
                with:
                    name: 'package'
                    path: 'nupkg/*.nupkg'
                    if-no-files-found: 'error'

    deploy-to-nuget:
        needs: build-and-pack
        runs-on: ubuntu-latest
        steps:
            - name: Download Package
              uses: actions/download-artifact@v5
              with:
                  name: 'package'
                  path: ./build

            - name: Setup .NET
              uses: actions/setup-dotnet@v4

            - name: Push to NuGet
              run: |
                dotnet nuget push ./build/*.nupkg \
                  --api-key "$API_KEY" \
                  --source https://api.nuget.org/v3/index.json \
                  --skip-duplicate
              env:
                  API_KEY: ${{ secrets.NUGET_API_KEY }}

    deploy-to-github:
        needs: build-and-pack
        runs-on: ubuntu-latest
        steps:
            - name: Download Package
              uses: actions/download-artifact@v5
              with:
                  name: 'package'
                  path: ./build

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ needs.build-and-pack.outputs.project }} v${{ needs.build-and-pack.outputs.version }}
                  tag_name: ${{ github.ref_name }}
                  generate_release_notes: true
                  files: ./build/*.nupkg
