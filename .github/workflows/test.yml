name: 'Test and Coverage'

on:
    pull_request:
        paths: &src_files
            - 'ThunderPipe.Core/**/*.cs'
            - 'ThunderPipe.Core.Tests/**/*.cs'
            - 'ThunderPipe.Core/*.csproj'
            - 'ThunderPipe.Core.Tests/*.csproj'
            - '**/*.sln'
            - 'Directory.Build.targets'
            - 'global.json'
            - 'coverlet.runsettings'
    push:
        branches: [ master ]
        paths: *src_files

jobs:
    build-and-test:
        name: 'Build and Test for ${{ matrix.os }}'
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ ubuntu-latest, windows-latest, macOS-latest ]
        env:
            OS: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-dotnet@v4
            - name: 'Install dependencies'
              run: dotnet restore

            - name: 'Build'
              run: dotnet build --configuration Release --no-restore

            - name: 'Run Tests'
              run: dotnet test --collect:"XPlat Code Coverage" --settings coverlet.runsettings

            - name: 'Upload coverage to Codecov'
              uses: codecov/codecov-action@v3
              with:
                directory: './ThunderPipe.Core.Tests/TestResults/'
                env_vars: OS
                fail_ci_if_error: 'false'
                token: ${{ secrets.CODECOV_TOKEN }}
